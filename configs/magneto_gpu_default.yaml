output_dir: reports/magneto_gpu
device: cpu
seeds: [11, 29, 47]
tuning_seeds: [11]
search_budget: 1
optimizers:
  - magneto_hamiltonian_adam
  - magneto_hamiltonian_adam_improved
  - real_hamiltonian_adam
  - magneto_adam
  - adamw
  - rmsprop
  - sgd_momentum
tuning_tasks:
  - breast_cancer_mlp
  - conflicting_batches_classification
  - digits_cnn
  - oscillatory_valley
benchmark_tasks:
  - breast_cancer_mlp
  - wine_mlp
  - digits_cnn
  - conflicting_batches_classification
  - oscillatory_valley
tuning_epoch_scale: 0.45
benchmark_epoch_scale: 0.7
use_tuning_results: true
