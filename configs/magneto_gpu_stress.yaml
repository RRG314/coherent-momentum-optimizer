output_dir: reports/magneto_gpu
device: cpu
seeds: [11, 29, 47]
tuning_seeds: [11]
search_budget: 1
optimizers:
  - magneto_hamiltonian_adam
  - magneto_hamiltonian_adam_improved
  - real_hamiltonian_adam
  - magneto_adam
  - adamw
  - rmsprop
  - sgd_momentum
  - adam
  - topological_adam
tuning_tasks:
  - oscillatory_valley
  - saddle_objective
  - direction_reversal_objective
stress_tasks:
  - oscillatory_valley
  - saddle_objective
  - rosenbrock_valley
  - narrow_valley_objective
  - direction_reversal_objective
  - noisy_quadratic_objective
  - plateau_escape_objective
  - conflicting_batches_classification
tuning_epoch_scale: 0.4
stress_epoch_scale: 0.75
use_tuning_results: true
