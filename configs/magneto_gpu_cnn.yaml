output_dir: reports/magneto_gpu
device: cpu
seeds: [11, 29, 47]
tuning_seeds: [11]
search_budget: 1
optimizers:
  - magneto_hamiltonian_adam
  - magneto_hamiltonian_adam_improved
  - real_hamiltonian_adam
  - adamw
  - rmsprop
  - sgd_momentum
  - adam
tuning_tasks:
  - digits_cnn
  - digits_cnn_label_noise
  - digits_cnn_input_noise
benchmark_tasks:
  - digits_cnn
  - digits_cnn_label_noise
  - digits_cnn_input_noise
tuning_epoch_scale: 0.4
benchmark_epoch_scale: 0.75
use_tuning_results: true
