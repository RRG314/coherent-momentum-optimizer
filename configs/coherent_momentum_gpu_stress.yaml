output_dir: reports/coherent_momentum_gpu
device: cpu
seeds: [11, 29, 47]
tuning_seeds: [11]
search_budget: 1
optimizers:
  - coherent_momentum_optimizer
  - coherent_momentum_optimizer_improved
  - coherent_momentum_real_baseline
  - coherent_direction_reference
  - adamw
  - rmsprop
  - sgd_momentum
  - adam
  - topological_adam
tuning_tasks:
  - oscillatory_valley
  - saddle_objective
  - direction_reversal_objective
stress_tasks:
  - oscillatory_valley
  - saddle_objective
  - rosenbrock_valley
  - narrow_valley_objective
  - direction_reversal_objective
  - noisy_quadratic_objective
  - plateau_escape_objective
  - conflicting_batches_classification
tuning_epoch_scale: 0.4
stress_epoch_scale: 0.75
use_tuning_results: true
